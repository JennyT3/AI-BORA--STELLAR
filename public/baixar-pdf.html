<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baixar PDF | AI BORA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --laranja: #F25C05;
    --preto: #1A1A1A;
    --branco: #ffffff;
  }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #0a0a0a;
    color: var(--branco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .container {
    text-align: center;
    max-width: 500px;
  }
  h1 {
    font-size: 32px;
    margin-bottom: 16px;
    font-weight: 900;
  }
  h1 span { color: var(--laranja); }
  p {
    color: rgba(255,255,255,0.6);
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--laranja);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    padding: 18px 40px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(242,92,5,0.35);
    text-decoration: none;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(242,92,5,0.5);
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .loading {
    display: none;
    margin-top: 20px;
    color: var(--laranja);
    font-weight: 600;
  }
  .aviso {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div class="container">
  <img src="logo.png" alt="AI BORA" class="logo">
  <h1>Baixar <span>PDF</span></h1>
  <p>Clica no botão abaixo para descarregar a proposta comercial em formato PDF.</p>
  <button class="btn" onclick="gerarPDF()">
    📄 Descarregar PDF
  </button>
  <div class="loading" id="loading">A gerar PDF...</div>
  <p class="aviso">O ficheiro será descarregado automaticamente</p>
</div>

<script>
async function gerarPDF() {
  const btn = document.querySelector('.btn');
  const loading = document.getElementById('loading');
  
  btn.style.display = 'none';
  loading.style.display = 'block';
  
  try {
    const response = await fetch('proposta.html');
    const html = await response.text();
    
    const container = document.createElement('div');
    container.innerHTML = html;
    container.style.position = 'absolute';
    container.style.left = '-9999px';
    container.style.width = '210mm';
    document.body.appendChild(container);
    
    const opt = {
      margin: 0,
      filename: 'Proposta-AIBORA.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    await html2pdf().set(opt).from(container.querySelector('body')).save();
    
    document.body.removeChild(container);
  } catch (error) {
    console.error('Erro:', error);
    alert('Erro ao gerar PDF. Tenta novamente.');
  }
  
  btn.style.display = 'inline-flex';
  loading.style.display = 'none';
}
</script>
</body>
</html>
