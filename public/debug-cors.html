<!DOCTYPE html>
<html>
<head>
  <title>Debug CORS</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; white-space: pre-wrap; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <h1>Debug CORS - Paso a Paso</h1>
  
  <button onclick="testHealth()">1. Test /api/health</button>
  <button onclick="testDemo()">2. Test /api/demo/marketing-plan</button>
  <button onclick="test402()">3. Test /api/ai/marketing-plan (402)</button>
  
  <div id="status" style="margin: 20px 0; padding: 10px; background: #f0f0f0;">
    Click a button to test...
  </div>
  
  <h3>Response:</h3>
  <pre id="response">Waiting...</pre>
  
  <h3>Console Log:</h3>
  <pre id="console"></pre>
  
  <script>
    const SERVER = 'http://localhost:3002';
    
    function log(msg, type = 'info') {
      const el = document.getElementById('console');
      const time = new Date().toLocaleTimeString();
      el.textContent += `[${time}] ${msg}\n`;
      console.log(msg);
    }
    
    function setStatus(msg, type = 'info') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }
    
    function showResponse(data) {
      document.getElementById('response').textContent = JSON.stringify(data, null, 2);
    }
    
    async function testHealth() {
      setStatus('Testing /api/health...', 'info');
      log('Fetching ' + SERVER + '/api/health');
      
      try {
        const res = await fetch(SERVER + '/api/health');
        log('Response status: ' + res.status);
        log('Response OK: ' + res.ok);
        
        const data = await res.json();
        showResponse(data);
        setStatus('SUCCESS: Server is online!', 'success');
        log('SUCCESS: ' + JSON.stringify(data));
      } catch (err) {
        setStatus('ERROR: ' + err.message, 'error');
        log('ERROR: ' + err.message);
        log('Stack: ' + err.stack);
      }
    }
    
    async function testDemo() {
      setStatus('Testing /api/demo/marketing-plan...', 'info');
      log('Fetching ' + SERVER + '/api/demo/marketing-plan');
      
      try {
        const res = await fetch(SERVER + '/api/demo/marketing-plan');
        log('Response status: ' + res.status);
        
        const data = await res.json();
        showResponse(data);
        setStatus('SUCCESS: Demo endpoint works!', 'success');
        log('SUCCESS: Got demo data');
      } catch (err) {
        setStatus('ERROR: ' + err.message, 'error');
        log('ERROR: ' + err.message);
      }
    }
    
    async function test402() {
      setStatus('Testing /api/ai/marketing-plan (expect 402)...', 'info');
      log('Fetching ' + SERVER + '/api/ai/marketing-plan');
      
      try {
        const res = await fetch(SERVER + '/api/ai/marketing-plan');
        log('Response status: ' + res.status);
        log('Expected: 402 Payment Required');
        
        const data = await res.json();
        showResponse(data);
        
        if (res.status === 402) {
          setStatus('SUCCESS: Got 402 Payment Required (expected)', 'success');
          log('SUCCESS: Server returned 402');
          log('Price: $' + (data.price || 'unknown'));
          log('Service: ' + (data.service || 'unknown'));
        } else {
          setStatus('WARNING: Expected 402, got ' + res.status, 'info');
        }
      } catch (err) {
        setStatus('ERROR: ' + err.message, 'error');
        log('ERROR: ' + err.message);
        log('This means fetch() itself failed');
        log('Possible causes:');
        log('- Server not running');
        log('- CORS blocking');
        log('- Network error');
      }
    }
    
    // Auto-run health check on load
    window.onload = () => {
      log('=== Page loaded ===');
      log('Server URL: ' + SERVER);
      log('Browser: ' + navigator.userAgent);
      setTimeout(testHealth, 500);
    };
  </script>
</body>
</html>
